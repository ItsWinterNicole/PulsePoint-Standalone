<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10161f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PulsePoint" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icons/pulsepoint-icon.svg" />
    <link rel="apple-touch-icon" href="/icons/pulsepoint-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>PulsePoint</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const isLocalDev = location.hostname === "localhost" || location.hostname === "127.0.0.1";
        if (!isLocalDev || !("serviceWorker" in navigator)) return;

        const cleanupKey = "pulsepoint.dev-sw-cleanup-v1";
        if (sessionStorage.getItem(cleanupKey)) return;

        Promise.all([
          navigator.serviceWorker.getRegistrations().then((registrations) =>
            Promise.all(registrations.map((registration) => registration.unregister()))
          ),
          "caches" in window
            ? caches.keys().then((keys) =>
              Promise.all(keys.filter((key) => key.startsWith("pulsepoint-shell-")).map((key) => caches.delete(key)))
            )
            : Promise.resolve([]),
        ]).then(([registrations, deletedCaches]) => {
          if (!registrations.length && !deletedCaches.some(Boolean)) return;
          sessionStorage.setItem(cleanupKey, "1");
          location.reload();
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
